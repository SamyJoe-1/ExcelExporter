<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excel Export App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    header h1 {
      font-size: 2rem;
      font-weight: 700;
      color: #38bdf8;
      letter-spacing: -0.5px;
    }
    header p {
      margin-top: 8px;
      color: #94a3b8;
      font-size: 0.95rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 28px;
      width: 100%;
      max-width: 900px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .toolbar span {
      font-size: 0.9rem;
      color: #64748b;
    }

    #exportBtn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #0ea5e9;
      color: #fff;
      border: none;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    #exportBtn:hover  { background: #0284c7; }
    #exportBtn:active { transform: scale(0.97); }
    #exportBtn svg { width: 18px; height: 18px; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    thead th {
      background: #1F4E79;
      color: #fff;
      padding: 12px 16px;
      text-align: center;
      font-weight: 600;
      letter-spacing: 0.3px;
    }
    tbody tr:nth-child(even) { background: #1a2e45; }
    tbody tr:nth-child(odd)  { background: #1e293b; }
    tbody tr:hover           { background: #264966; transition: background 0.15s; }
    tbody td {
      padding: 10px 16px;
      text-align: center;
      border-bottom: 1px solid #2d3f55;
      color: #cbd5e1;
    }
    tfoot td {
      padding: 12px 16px;
      text-align: center;
      background: #2E75B6;
      color: #fff;
      font-weight: 700;
    }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-eng  { background: #0c4a6e; color: #7dd3fc; }
    .badge-mkt  { background: #431407; color: #fdba74; }
    .badge-hr   { background: #14532d; color: #86efac; }
    .badge-fin  { background: #3b0764; color: #d8b4fe; }

    #status {
      margin-top: 16px;
      font-size: 0.85rem;
      color: #22d3ee;
      min-height: 20px;
      text-align: right;
    }
  </style>
</head>
<body>

<header>
  <h1>📊 Excel Export App</h1>
  <p>Preview data below, then export it as a styled .xlsx file</p>
</header>

<div class="card">
  <div class="toolbar">
    <span id="rowCount">Loading…</span>
    <button id="exportBtn" onclick="exportExcel()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Export to Excel
    </button>
  </div>

  <table id="dataTable">
    <thead>
      <tr>
        <th>ID</th><th>Full Name</th><th>Department</th><th>Salary ($)</th><th>Joined</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="5" style="padding:24px;color:#64748b;">Loading data…</td></tr>
    </tbody>
    <tfoot id="tableFoot"></tfoot>
  </table>

  <div id="status"></div>
</div>

<script>
  const deptClass = {
    Engineering: 'badge-eng',
    Marketing:   'badge-mkt',
    HR:          'badge-hr',
    Finance:     'badge-fin',
  };

  async function loadData() {
    const res  = await fetch('/api/data');
    const rows = await res.json();
    const body = document.getElementById('tableBody');
    const foot = document.getElementById('tableFoot');

    body.innerHTML = rows.map(r => `
      <tr>
        <td>${r.id}</td>
        <td>${r.name}</td>
        <td><span class="badge ${deptClass[r.department] || ''}">${r.department}</span></td>
        <td>$${r.salary.toLocaleString()}</td>
        <td>${r.joined}</td>
      </tr>
    `).join('');

    const total = rows.reduce((s, r) => s + r.salary, 0);
    foot.innerHTML = `<tr>
      <td colspan="3">TOTAL</td>
      <td>$${total.toLocaleString()}</td>
      <td></td>
    </tr>`;

    document.getElementById('rowCount').textContent = `${rows.length} records`;
  }

  async function exportExcel() {
    const btn    = document.getElementById('exportBtn');
    const status = document.getElementById('status');
    btn.disabled = true;
    btn.textContent = 'Generating…';
    status.textContent = '';

    try {
      const res = await fetch('/api/export');
      if (!res.ok) throw new Error('Server error');

      const blob = await res.blob();
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = 'employees.xlsx';
      a.click();
      URL.revokeObjectURL(url);
      status.textContent = '✅ File downloaded successfully!';
    } catch (e) {
      status.textContent = '❌ Export failed. Is the server running?';
      status.style.color = '#f87171';
    } finally {
      btn.disabled    = false;
      btn.innerHTML   = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px">
        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg> Export to Excel`;
    }
  }

  loadData();
</script>
</body>
</html>
